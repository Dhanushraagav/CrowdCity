<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA Meta and Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <meta name="theme-color" content="#0D9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CrowdCity">
  <script src="js/pwa-helper.js" defer></script>
  <!-- Central Authentication Router -->
  <script src="js/auth-router.js?v=1.0.6"></script>
  <script src="js/i18n.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Saved Schemes - Manage your bookmarked Tamil Nadu and Central Government welfare schemes.">
  <title>My Saved Schemes - CrowdCity AI</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css?v=1.0.5">
  <link rel="stylesheet" href="css/components.css">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    (function() {
      document.documentElement.classList.add('light-theme');
      document.documentElement.classList.remove('dark-theme');
    })();
  </script>
</head>
<body class="protected-page">

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="app-sidebar">
      <a href="citizen-dashboard.html" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none; padding: 0.5rem 0.75rem;" class="app-sidebar-logo">
        <img src="images/crowdcity_icon_transparent.png" alt="CrowdCity" class="brand-emblem" style="width: 34px; height: 34px; flex-shrink: 0; object-fit: contain;" />
        <div class="brand-text-container" style="display: flex; flex-direction: column; line-height: 1.1; gap: 0.05rem; text-align: left;">
          <span class="brand-title" style="font-size: 1.1rem; font-weight: 800; color: #ffffff; letter-spacing: 0.5px; font-family: var(--font-heading, inherit);">CrowdCity</span>
          <span class="brand-subtitle" style="font-size: 0.65rem; font-weight: 600; color: #fbbf24; text-transform: uppercase; letter-spacing: 0.8px; font-family: var(--font-heading, inherit);">Powered by AI</span>
        </div>
      </a>
      <nav class="app-sidebar-nav">
        <a href="citizen-dashboard.html" class="app-sidebar-link">
          <i class="fa-solid fa-house-chimney"></i> <span data-i18n="dashboard">DASHBOARD</span>
        </a>
        <a href="services.html" class="app-sidebar-link active">
          <i class="fa-solid fa-building-columns"></i> <span data-i18n="nav_services">Govt Services</span>
        </a>
        <a href="report.html" class="app-sidebar-link">
          <i class="fa-solid fa-plus"></i> <span data-i18n="report_issue">REPORT ISSUE</span>
        </a>
        <a href="my-complaints.html" class="app-sidebar-link">
          <i class="fa-solid fa-clipboard-list"></i> <span data-i18n="my_complaints">MY COMPLAINTS</span>
        </a>
        <a href="map.html" class="app-sidebar-link">
          <i class="fa-solid fa-map-location-dot"></i> <span data-i18n="map">MAP</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="app-main">
      <header class="app-header-main">
        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
          <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="services.html" style="color: var(--text-main); font-size: 1.1rem; text-decoration: none;">
              <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 style="font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin: 0;">My Saved Schemes</h1>
          </div>

          <a href="scheme-checker.html" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.82rem; font-weight: 700; border-radius: 10px; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;">
            <i class="fa-solid fa-plus"></i> <span>Find More Schemes</span>
          </a>
        </div>
      </header>

      <div class="app-content-body" style="padding: 1.5rem; max-width: 900px; margin: 0 auto;">
        
        <!-- Header Summary Banner -->
        <div style="background: linear-gradient(135deg, rgba(13, 148, 136, 0.12), rgba(99, 102, 241, 0.08)); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.75rem; margin-bottom: 2rem;">
          <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
            <div>
              <span style="font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 0.25rem;">
                Saved Bookmarks
              </span>
              <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin: 0 0 0.25rem 0; font-family: var(--font-heading, system-ui);">
                Your Bookmarked Government Schemes
              </h2>
              <p style="font-size: 0.88rem; color: var(--text-muted); margin: 0;">
                Quickly access, review documents, or apply to government welfare programs you saved.
              </p>
            </div>

            <div style="background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 14px; padding: 0.75rem 1.25rem; text-align: center;">
              <span id="saved-count-number" style="font-size: 1.6rem; font-weight: 800; color: var(--primary); display: block; line-height: 1;">0</span>
              <span style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Saved Items</span>
            </div>
          </div>
        </div>

        <!-- Saved Schemes Cards List -->
        <div id="saved-schemes-list">
          <!-- Dynamically populated by js/saved-schemes.js -->
        </div>

      </div>
    </main>
  </div>

  <!-- Supabase CDN Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Application Logic -->
  <script src="js/auth.js"></script>
  <script src="js/saved-schemes.js"></script>
</body>
</html>
