<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - CrowdCity AI</title>
  <style>
    :root {
      --bg-app: #080b11;
      --bg-surface: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #0d9488;
      --primary-hover: #14b8a6;
      --border-color: rgba(255, 255, 255, 0.08);
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      box-sizing: border-box;
    }

    .offline-card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-container {
      width: 80px;
      height: 80px;
      background-color: rgba(13, 148, 136, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem auto;
      color: var(--primary);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(13, 148, 136, 0.4);
      }
      70% {
        box-shadow: 0 0 0 12px rgba(13, 148, 136, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(13, 148, 136, 0);
      }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.75rem 0;
      letter-spacing: -0.025em;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin: 0 0 2rem 0;
    }

    .retry-btn {
      background-color: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-md);
      padding: 0.85rem 1.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .retry-btn:hover {
      background-color: var(--primary-hover);
    }

    .retry-btn:active {
      transform: scale(0.98);
    }

    .footer-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon-container">
      <!-- SVG Wifi-Off Icon (completely offline safe) -->
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"></path>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
        <path d="M5 12.5a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a16 16 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>Connection Lost</h1>
    <p>It looks like you are currently offline. CrowdCity AI requires an active internet connection to load live dashboard feeds and file reports.</p>
    <button onclick="window.location.reload()" class="retry-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
      </svg>
      Try Reloading
    </button>
    <div class="footer-note">CrowdCity AI • Civic Issue Platform</div>
  </div>
</body>
</html>
