<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA Meta and Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0D9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CrowdCity">
  <script src="js/pwa-helper.js" defer></script>
  <!-- Central Authentication Router -->
  <script src="js/auth-router.js?v=1.0.5"></script>
  <script src="js/i18n.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Securely reset your CrowdCity AI account password.">
  <title>Reset Password - CrowdCity AI</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css?v=1.0.5">
  <link rel="stylesheet" href="css/components.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('cc_theme');
      if (savedTheme === 'dark') document.documentElement.classList.add('dark-theme');
      else if (savedTheme === 'light') document.documentElement.classList.add('light-theme');
    })();
  </script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      opacity: 0;
      transition: opacity 0.15s ease-in;
    }
    body.ready {
      opacity: 1;
    }

    .reset-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      box-sizing: border-box;
      padding: 1.5rem;
      background-color: var(--bg-app);
    }

    .reset-card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-sizing: border-box;
    }

    @media (max-width: 480px) {
      .reset-card {
        padding: 1.5rem 1rem !important;
      }
    }

    .reset-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .reset-logo {
      width: 44px;
      height: 44px;
      background-color: var(--text-main);
      color: var(--bg-surface);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .reset-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      font-family: var(--font-heading);
    }

    .reset-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .alert-banner {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .alert-banner.error {
      background-color: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .alert-banner.success {
      background-color: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .footer-actions {
      text-align: center;
      border-top: 1px solid var(--border-color);
      padding-top: 1rem;
      margin-top: 0.5rem;
    }

    .btn-link {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition-fast);
    }

    .btn-link:hover {
      color: var(--text-main);
    }

    #debug-log-panel {
      font-family: monospace;
      font-size: 0.72rem;
      background-color: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>

  <div class="reset-container">
    <div class="reset-card">
      
      <div class="reset-header" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem;">
        <img src="images/crowdcity_logo_transparent.png" alt="CrowdCity Logo" style="height: 80px; object-fit: contain; margin-bottom: 0.5rem;" />
        <h1 class="reset-title" data-i18n="reset_password">Reset Password</h1>
      </div>

      <!-- Alert Banners -->
      <div id="reset-alert" class="alert-banner error hidden"></div>

      <!-- No Active Session Banner -->
      <div id="no-session-banner" class="alert-banner error hidden">
        <i class="fa-solid fa-triangle-exclamation"></i> No active password recovery session detected. Please check your recovery email link or request a new one.
      </div>

      <!-- Form: Reset Password -->
      <form id="reset-password-form" class="hidden" style="display: flex; flex-direction: column; gap: 1.25rem;">
        <div class="form-group">
          <label for="new-password" class="form-label" data-i18n="new_password">New Password</label>
          <input type="password" id="new-password" class="form-input" placeholder="At least 6 characters" data-i18n-placeholder="new_password_placeholder" required>
        </div>
        
        <div class="form-group">
          <label for="confirm-new-password" class="form-label" data-i18n="confirm_password">Confirm Password</label>
          <input type="password" id="confirm-new-password" class="form-input" placeholder="Confirm your new password" data-i18n-placeholder="confirm_new_password_placeholder" required>
        </div>

        <button type="submit" id="btn-reset-submit" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%;" data-i18n="update_password">
          <i class="fa-solid fa-check"></i> Update Password
        </button>
      </form>

      <!-- Debug logs panel -->
      <div id="debug-log-panel"></div>

      <div class="footer-actions">
        <a href="authority-login.html" class="btn-link" data-i18n="back_to_authority_login"><i class="fa-solid fa-arrow-left"></i> Back to Authority Login</a>
      </div>

    </div>
  </div>

  <!-- Supabase & Authentication Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/reset-password.js"></script>

</body>
</html>
