<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA Meta and Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0D9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CrowdCity">
  <script src="js/pwa-helper.js" defer></script>
  <!-- Central Authentication Router -->
  <script src="js/auth-router.js?v=1.0.6"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Municipal authority login page for CrowdCity AI. Official portal for inspectors, dispatchers, and administrators.">
  <title>Authority Login - CrowdCity AI</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css?v=1.0.5">
  <link rel="stylesheet" href="css/components.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('cc_theme');
      if (savedTheme === 'dark') document.documentElement.classList.add('dark-theme');
      else if (savedTheme === 'light') document.documentElement.classList.add('light-theme');
    })();
  </script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      opacity: 0;
      transition: opacity 0.15s ease-in;
    }
    body.ready {
      opacity: 1;
    }

    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
      padding: 1.5rem;
      background-color: var(--bg-app);
    }

    .login-card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .login-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .login-logo {
      width: 44px;
      height: 44px;
      background-color: var(--text-main);
      color: var(--bg-surface);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-main);
      font-family: var(--font-heading);
    }

    .login-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .alert-banner {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .alert-banner.error {
      background-color: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .alert-banner.success {
      background-color: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .btn-submit {
      margin-top: 0.5rem;
    }

    .footer-actions {
      text-align: center;
      border-top: 1px solid var(--border-color);
      padding-top: 1rem;
      margin-top: 0.5rem;
    }

    .btn-link {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition-fast);
    }

    .btn-link:hover {
      color: var(--text-main);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      
      <div class="login-header" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem;">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Emblem_of_Tamil_Nadu.svg" alt="Govt. of Tamil Nadu Emblem" style="height: 85px; object-fit: contain;" />
          <div style="width: 1px; height: 60px; background: var(--border-color); margin: 0 0.25rem;"></div>
          <img src="images/crowdcity_icon_transparent.png" alt="CrowdCity Logo" style="height: 60px; object-fit: contain;" />
        </div>
        <h1 class="login-title" data-i18n="authority_portal_title" style="font-size: 1.35rem; font-weight: 800; font-family: var(--font-heading); color: var(--text-main); margin-bottom: 0.2rem;">TN Civic Authority Console</h1>
        <span style="font-size: 0.72rem; color: #fbbf24; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">CrowdCity Partnership</span>
      </div>

      <div id="auth-alert" class="alert-banner error hidden"></div>

      <form id="authority-login-form" style="display: flex; flex-direction: column; gap: 1.25rem;">
        <div class="form-group">
          <label for="login-email" class="form-label" data-i18n="work_email">Work Email</label>
          <input type="email" id="login-email" class="form-input" data-i18n-placeholder="enter_official_email" placeholder="Enter your official email address" required autocomplete="off">
        </div>
        
        <div class="form-group">
          <label for="login-password" class="form-label" data-i18n="password">Password</label>
          <div class="password-input-container">
            <input type="password" id="login-password" class="form-input" data-i18n-placeholder="enter_password" placeholder="Enter your password" required autocomplete="new-password" style="width: 100%; box-sizing: border-box;">
            <i class="fa-regular fa-eye toggle-password-visibility" data-target="login-password"></i>
          </div>
        </div>

        <button type="submit" id="btn-login-submit" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%;">
          <i class="fa-solid fa-right-to-bracket"></i> <span data-i18n="access_dashboard">Access Dashboard</span>
        </button>
      </form>

      <div class="footer-actions">
        <a href="index.html" class="btn-link"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="back_to_citizen_portal">Back to Citizen Portal</span></a>
      </div>

    </div>
  </div>

  <!-- Supabase & Authentication Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/authority-login.js"></script>

</body>
</html>
