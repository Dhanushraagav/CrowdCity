<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Page Not Found - CrowdCity AI</title>
  <link rel="stylesheet" href="css/style.css?v=1.0.5">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: var(--bg-app);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .error-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>

  <div class="error-card">
    <div style="font-size: 3.5rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem;">404</div>
    <h1 style="font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin: 0 0 0.75rem 0;">Page Not Found</h1>
    <p style="font-size: 0.9rem; color: var(--text-muted); margin: 0 0 1.75rem 0; line-height: 1.5;">
      The page or government service link you are looking for may have been moved, renamed, or is temporarily unavailable.
    </p>

    <div style="display: flex; gap: 0.75rem; justify-content: center;">
      <a href="services.html" class="btn btn-secondary" style="padding: 0.65rem 1.2rem; font-weight: 700; border-radius: 10px; text-decoration: none;">
        Govt Services
      </a>
      <a href="citizen-dashboard.html" class="btn btn-primary" style="padding: 0.65rem 1.4rem; font-weight: 800; border-radius: 10px; text-decoration: none;">
        Return to Dashboard
      </a>
    </div>
  </div>

</body>
</html>
